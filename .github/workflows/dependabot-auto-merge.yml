# Auto-merge SAFE Dependabot PRs (patch + minor, incl. most security fixes)
# once required status checks pass. MAJOR bumps are intentionally NOT auto-merged
# — they stay open for manual review.
#
# How the CI gate works: `gh pr merge --auto` enables GitHub's native auto-merge,
# which only merges once the branch's REQUIRED status checks pass. That gating is
# enforced by branch protection on `main` (required checks: security-scan +
# lint-and-test). Without those required checks, auto-merge would not wait — so
# the branch-protection rule is a hard dependency of this workflow.
#
# Token: the built-in GITHUB_TOKEN is sufficient (no PAT) per GitHub's official
# "Automating Dependabot with GitHub Actions" guide — the elevated `permissions`
# block below grants the dependabot-triggered run write access.
name: Dependabot auto-merge

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot-auto-merge:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]' && github.repository == 'festion/mcp-servers'
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@d7267f607e9d3fb96fc2fbe83e0af444713e90b7 # v2.4.0
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Enable auto-merge for patch & minor updates
        if: steps.meta.outputs.update-type == 'version-update:semver-patch' || steps.meta.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment that a major update needs manual review
        if: steps.meta.outputs.update-type == 'version-update:semver-major'
        run: gh pr comment "$PR_URL" --body "🛑 Major version bump (\`${{ steps.meta.outputs.dependency-names }}\`) — left open for manual review (auto-merge covers patch/minor only)."
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

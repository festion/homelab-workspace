# Dependabot configuration — version + security update PRs, grouped weekly.
# Security ALERTS were already on org-wide; this adds proactive update PRs so
# vulnerable deps surface as PRs (not just alerts). Auto-merge of safe
# (patch/minor) updates is handled by .github/workflows/dependabot-auto-merge.yml.
#
# Ecosystems present in this monorepo (verified 2026-06-23):
#   npm            -> /api, /dashboard, /mcp-servers
#   uv             -> /mcp-servers/gmail-manage-mcp-server (uv.lock)
#   pip            -> memory-search / truenas / vikunja MCP servers (pyproject / requirements.txt)
#   github-actions -> /.github/workflows
#
# Grouping caps version-update groups at minor+patch so the grouped PR is always
# auto-merge-safe; MAJOR bumps come as individual PRs that stay open for review.
version: 2

updates:
  # ---------------- npm (3 Node projects) ----------------
  - package-ecosystem: "npm"
    directories:
      - "/api"
      - "/dashboard"
      - "/mcp-servers"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    groups:
      npm-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
      npm-security:
        applies-to: security-updates

  # ---------------- uv (gmail-manage MCP server) ----------------
  - package-ecosystem: "uv"
    directory: "/mcp-servers/gmail-manage-mcp-server"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    groups:
      uv-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
      uv-security:
        applies-to: security-updates

  # ---------------- pip (Python MCP servers) ----------------
  - package-ecosystem: "pip"
    directories:
      - "/mcp-servers/memory-search-mcp-server"
      - "/mcp-servers/truenas-mcp-server"
      - "/mcp-servers/vikunja-mcp-server"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    groups:
      pip-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
      pip-security:
        applies-to: security-updates

  # ---------------- GitHub Actions ----------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      actions-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
